<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>simbridge rally</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0c0c10;
  color: #fff;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
  height: 100vh;
}

.dash {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  height: 100vh;
  padding: 4px;
}

/* === TOP ROW: RPM + SPEED === */
.top-row {
  display: -webkit-flex;
  display: flex;
  gap: 3px;
  margin-bottom: 3px;
}
.top-cell {
  -webkit-flex: 1;
  flex: 1;
  background: #141418;
  border: 1px solid #252530;
  border-radius: 4px;
  padding: 4px 10px;
  text-align: center;
}
.top-cell + .top-cell { margin-left: 3px; }
.top-label {
  font-size: 9px;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.top-val {
  font-size: 32px;
  font-weight: 700;
  color: #e8e8ec;
}

/* === RPM BAR === */
.rpm-strip {
  display: -webkit-flex;
  display: flex;
  height: 10px;
  padding: 0 1px;
  margin-bottom: 3px;
}
.rpm-s {
  -webkit-flex: 1;
  flex: 1;
  background: #1a1a20;
  border-radius: 1px;
  margin-right: 1px;
}
.rpm-s:last-child { margin-right: 0; }
.rpm-s.g { background: #22c55e; }
.rpm-s.y { background: #eab308; }
.rpm-s.r { background: #ef4444; }
.rpm-s.blink { -webkit-animation: bl 80ms infinite; animation: bl 80ms infinite; }
@-webkit-keyframes bl { 50% { opacity: 0.2; } }
@keyframes bl { 50% { opacity: 0.2; } }

/* === GEAR CENTER === */
.gear-area {
  display: -webkit-flex;
  display: flex;
  -webkit-flex: 1;
  flex: 1;
  gap: 3px;
  -webkit-align-items: stretch;
  align-items: stretch;
  margin-bottom: 3px;
  min-height: 0;
}

.gear-box {
  -webkit-flex: 1;
  flex: 1;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  border-radius: 8px;
  overflow: hidden;
  background: #141418;
  -webkit-transition: background-color 150ms;
  transition: background-color 150ms;
}

.gear-num {
  font-size: 160px;
  font-weight: 900;
  line-height: 1;
  color: #fff;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}
.gear-r { color: #ef4444; }

/* Side panels */
.side-panel {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  gap: 3px;
  width: 72px;
  min-width: 72px;
}
.side-cell {
  background: #141418;
  border: 1px solid #252530;
  border-radius: 4px;
  padding: 6px 8px;
  text-align: center;
  -webkit-flex: 1;
  flex: 1;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-justify-content: center;
  justify-content: center;
}
.side-label {
  font-size: 8px;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.side-val {
  font-size: 16px;
  font-weight: 600;
}

/* Flat tyre indicator */
.tyre-status {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
}
.tyre-indicator {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 0;
  text-align: center;
  border-radius: 2px;
  width: 50%;
}
.tyre-ok { color: #22c55e; }
.tyre-na { color: #444; }
.tyre-flat { color: #fff; background: #ef4444; -webkit-animation: flat-blink 500ms infinite; animation: flat-blink 500ms infinite; }
@-webkit-keyframes flat-blink { 50% { opacity: 0.4; } }
@keyframes flat-blink { 50% { opacity: 0.4; } }

/* === STAGE INFO ROW === */
.stage-row {
  display: -webkit-flex;
  display: flex;
  gap: 3px;
  -webkit-align-items: stretch;
  align-items: stretch;
  margin-bottom: 3px;
}
.stage-time-box {
  background: #141418;
  border: 1px solid #252530;
  border-radius: 4px;
  padding: 4px 16px;
  text-align: center;
}
.stage-label {
  font-size: 9px;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.stage-time {
  font-size: 24px;
  font-weight: 700;
  color: #e8e8ec;
}

.info-cell {
  -webkit-flex: 1;
  flex: 1;
  background: #141418;
  border: 1px solid #252530;
  border-radius: 4px;
  padding: 4px 10px;
  display: -webkit-flex;
  display: flex;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  -webkit-align-items: center;
  align-items: center;
}
.info-label {
  font-size: 9px;
  color: #9ca3af;
  text-transform: uppercase;
}
.info-val {
  font-size: 14px;
  font-weight: 600;
}

/* === PROGRESS BAR === */
.progress-wrap {
  background: #141418;
  border: 1px solid #252530;
  border-radius: 4px;
  padding: 4px 8px;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
}
.progress-label {
  font-size: 9px;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 1px;
  white-space: nowrap;
  margin-right: 8px;
}
.progress-track {
  -webkit-flex: 1;
  flex: 1;
  height: 6px;
  background: #1a1a20;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: -webkit-linear-gradient(left, #3b82f6, #22c55e);
  background: linear-gradient(90deg, #3b82f6, #22c55e);
  border-radius: 3px;
  width: 0%;
  -webkit-transition: width 200ms;
  transition: width 200ms;
}
.progress-pct {
  font-size: 11px;
  font-weight: 600;
  color: #b0b0b0;
  min-width: 50px;
  text-align: right;
  margin-left: 8px;
}

.status {
  position: fixed;
  bottom: 2px;
  right: 6px;
  font-size: 9px;
  color: #333;
}
.status-live { color: #22c55e; }

.fs-btn {
  position: fixed;
  top: 4px;
  right: 4px;
  z-index: 100;
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  color: #ccc;
  font-size: 20px;
  line-height: 36px;
  text-align: center;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="dash">

  <!-- TOP: RPM | SPEED -->
  <div class="top-row">
    <div class="top-cell">
      <span class="top-label">RPM</span>
      <span class="top-val" id="rpm">0</span>
    </div>
    <div class="top-cell">
      <span class="top-label">KM/H</span>
      <span class="top-val" id="speed">0</span>
    </div>
  </div>

  <!-- RPM STRIP -->
  <div class="rpm-strip" id="rpm-strip"></div>

  <!-- GEAR + SIDES -->
  <div class="gear-area">
    <!-- Left: fuel + TC/ABS -->
    <div class="side-panel">
      <div class="side-cell">
        <div class="side-label">Fuel</div>
        <div class="side-val" id="fuel">--</div>
      </div>
      <div class="side-cell">
        <div class="side-label">TC</div>
        <div class="side-val" id="tc">0</div>
      </div>
      <div class="side-cell">
        <div class="side-label">ABS</div>
        <div class="side-val" id="abs">0</div>
      </div>
    </div>

    <!-- Center: gear with solid RPM-based background -->
    <div class="gear-box" id="gear-box">
      <span class="gear-num" id="gear">N</span>
    </div>

    <!-- Right: tyre flat indicator -->
    <div class="side-panel">
      <div class="side-cell">
        <div class="side-label">Tyres</div>
        <div class="tyre-status">
          <span class="tyre-indicator tyre-ok" id="ty-fl">FL</span>
          <span class="tyre-indicator tyre-ok" id="ty-fr">FR</span>
          <span class="tyre-indicator tyre-ok" id="ty-rl">RL</span>
          <span class="tyre-indicator tyre-ok" id="ty-rr">RR</span>
        </div>
      </div>
    </div>
  </div>

  <!-- STAGE INFO -->
  <div class="stage-row">
    <div class="info-cell">
      <span class="info-label">Distance</span>
      <span class="info-val" id="distance">-- km</span>
    </div>
    <div class="stage-time-box">
      <div class="stage-label">Stage Time</div>
      <div class="stage-time" id="stagetime">0:00.00</div>
    </div>
    <div class="info-cell">
      <span class="info-label">Stage</span>
      <span class="info-val" id="stage-len">-- km</span>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-wrap">
    <span class="progress-label">Stage</span>
    <div class="progress-track">
      <div class="progress-fill" id="progress"></div>
    </div>
    <span class="progress-pct" id="progress-pct">-- / -- km</span>
  </div>
</div>

<span class="status" id="status">--</span>
<div class="fs-btn" id="fs-btn" title="Fullscreen">&#x26F6;</div>

<script>
var NUM_SEGS = 50;

function g(id) { return document.getElementById(id); }

// Build RPM strip
(function() {
  var strip = g("rpm-strip");
  for (var i = 0; i < NUM_SEGS; i++) {
    var s = document.createElement("div");
    s.className = "rpm-s";
    strip.appendChild(s);
  }
})();

function formatTime(s) {
  if (s <= 0) return "0:00.00";
  var m = Math.floor(s / 60);
  var sec = s % 60;
  var str = sec.toFixed(2);
  if (str.length < 5) str = "0" + str;
  return m + ":" + str;
}

function gearBgColor(rpmPct) {
  if (rpmPct >= 0.93) return "#7f1d1d";
  if (rpmPct >= 0.85) return "#991b1b";
  if (rpmPct >= 0.75) return "#78350f";
  if (rpmPct >= 0.60) return "#14532d";
  return "#141418";
}

function poll() {
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "/api/telemetry", true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status !== 200) {
      g("status").innerHTML = "error";
      g("status").className = "status";
      return;
    }

    var d;
    try { d = JSON.parse(xhr.responseText); } catch(e) { return; }

    if (!d.connected) {
      g("status").innerHTML = "no signal";
      g("status").className = "status";
      return;
    }
    g("status").innerHTML = "live";
    g("status").className = "status status-live";

    // RPM
    g("rpm").innerHTML = Math.round(d.rpm);

    // Speed
    g("speed").innerHTML = Math.round(d.speed_kmh);

    // RPM bar (segmented)
    var rpmPct = d.max_rpm > 0 ? d.rpm / d.max_rpm : 0;
    var litCount = Math.round(rpmPct * NUM_SEGS);
    var segs = g("rpm-strip").children;
    for (var i = 0; i < NUM_SEGS; i++) {
      var p = i / NUM_SEGS;
      if (i < litCount) {
        if (p > 0.85) segs[i].className = rpmPct > 0.95 ? "rpm-s blink r" : "rpm-s r";
        else if (p > 0.7) segs[i].className = "rpm-s y";
        else segs[i].className = "rpm-s g";
      } else {
        segs[i].className = "rpm-s";
      }
    }

    // Gear background
    g("gear-box").style.backgroundColor = gearBgColor(rpmPct);

    // Gear number
    var gEl = g("gear");
    gEl.innerHTML = d.gear;
    gEl.className = "gear-num" + (d.gear === "R" ? " gear-r" : "");

    // Stage time
    g("stagetime").innerHTML = formatTime(d.lap_time);

    // Fuel
    g("fuel").innerHTML = d.fuel > 0 ? d.fuel.toFixed(1) + "L" : "--";

    // TC/ABS
    g("tc").innerHTML = d.tc > 0 ? d.tc.toFixed(0) : "0";
    g("abs").innerHTML = d.abs > 0 ? d.abs.toFixed(0) : "0";

    // Flat tyre indicators — pure relative test, see rally.html for rationale.
    // Neutral "—" when game doesn't populate; flat when < 50% of others' median.
    var corners = ["fl","fr","rl","rr"];
    var pressures = d.tyre_pressure || [0,0,0,0];
    var anyReported = false;
    for (var k = 0; k < 4; k++) { if (pressures[k] > 0) { anyReported = true; break; } }
    for (var j = 0; j < 4; j++) {
      var pr = pressures[j];
      var el = g("ty-" + corners[j]);
      if (!anyReported) {
        el.className = "tyre-indicator tyre-na";
        el.innerHTML = corners[j].toUpperCase();
        continue;
      }
      var others = [];
      for (var m = 0; m < 4; m++) {
        if (m !== j && pressures[m] > 0) { others.push(pressures[m]); }
      }
      others.sort(function(a, b) { return a - b; });
      var med = 0;
      if (others.length === 3) { med = others[1]; }
      else if (others.length === 2) { med = (others[0] + others[1]) / 2; }
      else if (others.length === 1) { med = others[0]; }
      var isFlat = med > 0 && pr < med * 0.5;
      if (isFlat) {
        el.className = "tyre-indicator tyre-flat";
        el.innerHTML = corners[j].toUpperCase() + " FLAT";
      } else {
        el.className = "tyre-indicator tyre-ok";
        el.innerHTML = corners[j].toUpperCase();
      }
    }

    // Distance
    var distKm = d.lap_time > 0 ? (d.speed_kmh * d.lap_time / 3600) : 0;
    g("distance").innerHTML = distKm > 0 ? distKm.toFixed(1) + " km" : "-- km";

    // Stage length
    g("stage-len").innerHTML = "-- km";

    // Progress bar
    g("progress").style.width = "0%";
    g("progress-pct").innerHTML = distKm > 0 ? distKm.toFixed(1) + " km" : "-- / -- km";
  };
  xhr.send();
}

// Poll at ~5Hz
setInterval(poll, 200);
poll();

// Fullscreen
var fsBtn = g("fs-btn");
if (fsBtn) {
  fsBtn.onclick = function() {
    var el = document.documentElement;
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    } else {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  };
}
</script>
</body>
</html>
